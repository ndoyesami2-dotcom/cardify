<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories — Cardify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      try {
        if (localStorage.getItem("cardifyTheme") !== "light") {
          document.documentElement.classList.add("cardify-dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body class="home-page categories-page">
    <header class="account-topbar">
      <a href="./home.html" class="header-brand-link" aria-label="Cardify home">
        <img class="brand-logo brand-logo--header" src="./CARDIFY__1_-removebg-preview.png" alt="" decoding="async" />
      </a>
      <div class="account-topbar-body">
        <a class="link-back" href="./home.html" id="categoriesBack">← Back to dashboard</a>
        <h1 class="account-page-heading" id="categoriesTitle">Categories</h1>
      </div>
    </header>
    <main class="home-content categories-main">
      <div class="dashboard-search-row categories-search-row" role="search">
        <label class="visually-hidden" for="categorySearch" id="categorySearchLabel">Search categories</label>
        <input
          type="search"
          id="categorySearch"
          class="listing-search-input glassy-field"
          placeholder="Search categories or cards"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="listing-grid listing-grid--categories" id="categoryGrid"></div>
    </main>
    <script src="./listings-data.js"></script>
    <script src="./cart-storage.js"></script>
    <script src="./cathegories.js"></script>
  </body>
</html>
