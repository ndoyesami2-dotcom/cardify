<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listing — Cardify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=listing-media-7" />
    <link rel="stylesheet" href="./update-mode.css" />
    <style>
      /* Product image: fixed slot (px + %) so intrinsic img width cannot expand the page. */
      body.listing-details-body {
        overflow-x: hidden;
      }
      .listing-details-layout {
        min-width: 0;
        max-width: 100%;
        box-sizing: border-box;
      }
      .listing-details-grid {
        display: grid !important;
        grid-template-columns: minmax(0, 1fr) !important;
        gap: 20px !important;
        min-width: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box;
      }
      .listing-details-left {
        min-width: 0 !important;
        width: fit-content !important;
        max-width: 100% !important;
        justify-self: start;
        box-sizing: border-box;
      }
      .listing-img-slot {
        box-sizing: border-box;
        width: 260px;
        max-width: 100%;
        height: 360px;
        max-height: 85vh;
        flex-shrink: 0;
        overflow: hidden;
        margin: 0;
      }
      #listingImage.listing-image-panel {
        box-sizing: border-box !important;
        width: 100% !important;
        height: 100% !important;
        min-width: 0 !important;
        min-height: 0 !important;
        max-width: 100% !important;
        max-height: 100% !important;
        margin: 0 !important;
        padding: 8px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        overflow: hidden !important;
      }
      #listingImage img.listing-detail-img,
      #listingImage img {
        box-sizing: border-box !important;
        display: block !important;
        margin: 0 auto !important;
        padding: 0 !important;
        width: auto !important;
        height: auto !important;
        max-width: 100% !important;
        max-height: 100% !important;
        min-width: 0 !important;
        object-fit: contain !important;
      }
      .listing-details-main .similar-grid {
        max-width: 100%;
        overflow-x: auto;
      }
      .similar-card-thumb {
        overflow: hidden;
        min-height: 0;
      }
      .similar-card-thumb-img {
        display: block;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
      }
      @media (min-width: 900px) {
        .listing-details-grid {
          grid-template-columns: 260px minmax(0, 1fr) minmax(240px, 300px) !important;
        }
      }
    </style>
    <script>
      try {
        if (localStorage.getItem("cardifyTheme") !== "light") {
          document.documentElement.classList.add("cardify-dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body class="listing-details-body">
    <div class="bg-motifs" aria-hidden="true">
      <span class="motif motif-1">APPLE</span>
      <span class="motif motif-2">PS</span>
      <span class="motif motif-3">XBOX</span>
      <span class="motif motif-4">NINTENDO</span>
      <span class="motif motif-5">ROBLOX</span>
      <span class="motif motif-8">EPIC GAMES</span>
    </div>

    <header class="detail-topbar">
      <a href="./home.html" class="header-brand-link" aria-label="Cardify home">
        <img class="brand-logo brand-logo--header" src="./CARDIFY__1_-removebg-preview.png" alt="" decoding="async" />
      </a>
      <button type="button" class="link-back" id="backShop">← Back to shop</button>
      <div class="detail-search-wrap" role="search">
        <label class="visually-hidden" for="detailListingSearch" id="detailSearchLabel">Search gift cards</label>
        <input
          type="search"
          id="detailListingSearch"
          class="listing-search-input glassy-field"
          placeholder="Search gift cards"
          autocomplete="off"
          spellcheck="false"
          aria-describedby="detailSearchLabel"
        />
        <div class="detail-search-results hidden" id="detailSearchResults" aria-live="polite"></div>
      </div>
      <div class="detail-topbar-actions">
        <div class="overflow-menu" id="overflowMenuRoot">
          <button
            type="button"
            class="icon-btn overflow-menu-trigger"
            id="overflowMenuBtn"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="overflowMenuPanel"
            aria-label="More options"
          >
            ⋮
          </button>
          <div class="overflow-menu-panel hidden" id="overflowMenuPanel" role="menu">
            <button type="button" class="overflow-menu-item" id="themeToggleBtn" role="menuitem">Light mode</button>
          </div>
        </div>
      </div>
    </header>

    <main class="listing-details-layout">
      <h1 class="listing-details-page-title" id="listingTitle">Loading…</h1>
      <p class="listing-details-subtitle hidden" id="listingCountrySub" aria-live="polite"></p>
      <p class="listing-details-robux hidden" id="listingRobuxSub" aria-live="polite"></p>

      <div class="listing-details-grid">
        <aside class="listing-details-left">
          <div class="listing-img-slot">
            <div class="listing-image-panel" id="listingImage" aria-hidden="true"></div>
          </div>
        </aside>

        <section class="listing-details-main">
          <div class="rounded-info-block">
            <div class="rounded-info-block__title" id="platformBoxTitle">—</div>
            <p class="rounded-info-block__muted" id="platformBoxHint"></p>
          </div>

          <div class="region-switch-card" id="regionSwitch"></div>

          <section class="listing-reviews-section" aria-labelledby="listingReviewsHeading">
            <div class="listing-reviews-head">
              <h2 id="listingReviewsHeading">Reviews</h2>
              <p id="listingReviewsHint">Share what you think about this product.</p>
            </div>
            <form class="listing-review-form" id="listingReviewForm">
              <label class="visually-hidden" for="listingReviewInput" id="listingReviewLabel">Write a review</label>
              <textarea
                id="listingReviewInput"
                rows="3"
                maxlength="500"
                placeholder="Write your review..."
                required
              ></textarea>
              <button type="submit" class="primary-btn listing-review-submit" id="listingReviewSubmit">Post review</button>
            </form>
            <div class="listing-review-list" id="listingReviewList" aria-live="polite"></div>
          </section>

          <section class="similar-section similar-section--inline hidden" id="similarSection" aria-labelledby="similarHeading">
            <h2 class="similar-heading" id="similarHeading">Other amounts</h2>
            <p class="similar-hint" id="similarHint"></p>
            <div class="similar-grid" id="similarGrid"></div>
          </section>
        </section>

        <aside class="listing-details-aside">
          <div class="aside-sep"></div>
          <p class="aside-kicker" id="asideAmountLabel">Card value</p>
          <p class="aside-face" id="listingFaceAmount">—</p>
          <p class="aside-variant-note hidden" id="listingVariantNote" aria-live="polite"></p>
          <div class="aside-sep"></div>
          <p class="aside-kicker" id="asidePriceLabel">Price</p>
          <p class="aside-price" id="priceAmount">0 FCFA</p>
          <div class="aside-sep"></div>
          <p class="aside-line"><span aria-hidden="true">✉️</span> <span id="asideDelivery"></span></p>
          <p class="aside-line aside-stock"><span aria-hidden="true">🏭</span> <span id="asideStock"></span></p>
          <button type="button" class="primary-btn aside-cart-btn" id="addCartDetail">Add to cart</button>
          <button type="button" class="aside-wishlist-btn" id="wishlistDetail">Add to wishlist</button>
        </aside>
      </div>

      <section class="listing-local-payments" aria-labelledby="listingLocalPayHeading">
        <h2 class="listing-local-payments__title" id="listingLocalPayHeading">Pay with</h2>
        <div class="listing-local-payments__logos">
          <img
            class="listing-local-payments__img"
            src="./wave.png"
            alt="Wave"
            loading="lazy"
            decoding="async"
          />
          <img
            class="listing-local-payments__img listing-local-payments__img--om"
            src="./orange%20money.png"
            alt="Orange Money"
            loading="lazy"
            decoding="async"
          />
          <img
            class="listing-local-payments__img"
            src="./wave.png"
            alt="Wave"
            loading="lazy"
            decoding="async"
          />
        </div>
      </section>
    </main>

    <footer class="site-footer" role="contentinfo" aria-labelledby="securePayHeading">
      <div class="site-footer-inner">
        <h2 class="site-footer-heading" id="securePayHeading">Secure payment</h2>
        <div class="site-footer-logos">
          <img
            class="site-footer-logo"
            src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
            alt="Mastercard"
            height="28"
            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo"
            src="./visa.svg"
            alt="Visa"
            height="24"
            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo site-footer-logo--wave"
            src="./wave.png"
            alt="Wave"
            height="30"
            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo site-footer-logo--om"
            src="./orange%20money.png"
            alt="Orange Money"
            height="28"
            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo site-footer-logo--partner"
            src="./image(1).png"
            alt="Partner"
            height="32"
            loading="lazy"
            decoding="async"
          />
        </div>
        <nav class="site-footer-social" aria-label="Social">
          <a class="site-footer-social-link" href="https://www.instagram.com/giftcardshopsn/" target="_blank" rel="noopener noreferrer" title="Instagram" aria-label="Cardify on Instagram, opens in new tab"><span class="site-footer-social-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" focusable="false"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg></span></a>
          <a class="site-footer-social-link" href="https://www.tiktok.com/@cardifysngiftcard" target="_blank" rel="noopener noreferrer" title="TikTok" aria-label="Cardify on TikTok, opens in new tab"><span class="site-footer-social-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" focusable="false"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg></span></a>
        </nav>
        <p class="site-footer-support-line" style="margin: 18px 0 0">
          <button type="button" class="primary-btn listing-support-launch" id="listingSupportBtn" style="width: auto; padding: 12px 24px; display: inline-block">
            Support
          </button>
        </p>
        <p class="site-footer-terms">
          <a class="site-footer-terms-link" href="./terms.html" id="siteFooterTermsLink">Terms and conditions</a>
          <span class="site-footer-terms-sep" aria-hidden="true">·</span>
          <a class="site-footer-terms-link" href="./terms.html" id="siteFooterTosLink">Terms of Service</a>
        </p>
      </div>
    </footer>

    <script src="./listings-data.js"></script>
    <script src="./user-storage.js"></script>
    <script src="./cart-storage.js"></script>
    <script src="./firebase-config-public.js"></script>
    <script type="module" src="./update-mode.js"></script>
    <script type="module" src="./support-ui.js?v=support-1"></script>
    <script src="./listing-details.js?v=similar-thumb-2"></script>
    <script src="./footer-terms-href.js" defer></script>
  </body>
</html>
