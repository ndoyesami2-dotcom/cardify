<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firestore test — Cardify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./update-mode.css" />
    <style>
      body {
        font-family: "DM Sans", system-ui, sans-serif;
        padding: 28px 20px 0;
        color: var(--text);
        max-width: 640px;
        margin: 0 auto;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.35rem;
      }
      button {
        padding: 10px 18px;
        font-size: 0.95rem;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        font-weight: 600;
        margin-right: 10px;
        margin-bottom: 10px;
      }
      button:hover {
        filter: brightness(1.05);
      }
      pre {
        background: var(--surface);
        padding: 14px;
        border-radius: 10px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid var(--line);
      }
      .ok {
        color: #8cf9bd;
      }
      .err {
        color: #ff9e9e;
      }
      a {
        color: var(--accent);
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Firestore write test</h1>
    <p>
      Run <code>node server.js</code>, open this page over <strong>http://127.0.0.1:PORT/firestore-test.html</strong> (not
      <code>file://</code>), then use the buttons. Rules must allow creates on <code>payments</code> and
      <code>checkoutTests</code>.
    </p>
    <p>
      <button type="button" id="btnPayments">Test → <code>payments</code></button>
      <button type="button" id="btnCheckoutTests">Test → <code>checkoutTests</code></button>
    </p>
    <pre id="out">Click a button.</pre>
    <p><a href="./home.html">← Back to shop</a></p>

    <footer class="site-footer" role="contentinfo" aria-labelledby="securePayHeading">
      <div class="site-footer-inner">
        <h2 class="site-footer-heading" id="securePayHeading">Secure payment</h2>
        <div class="site-footer-logos">
          <img
            class="site-footer-logo"
            src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
            alt="Mastercard"
            height="28"
            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo"
            src="./visa.svg"
            alt="Visa"
            height="24"
            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo site-footer-logo--wave"
            src="./wave.png"
            alt="Wave"
            height="30"
            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo site-footer-logo--om"
            src="./orange%20money.png"
            alt="Orange Money"
            height="28"
            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo site-footer-logo--partner"
            src="./image(1).png"
            alt="Partner"
            height="32"
            loading="lazy"
            decoding="async"
          />
        </div>
        <nav class="site-footer-social" aria-label="Social">
          <a class="site-footer-social-link" href="https://www.instagram.com/giftcardshopsn/" target="_blank" rel="noopener noreferrer" title="Instagram" aria-label="Cardify on Instagram, opens in new tab"><span class="site-footer-social-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" focusable="false"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg></span></a>
          <a class="site-footer-social-link" href="https://www.tiktok.com/@cardifysngiftcard" target="_blank" rel="noopener noreferrer" title="TikTok" aria-label="Cardify on TikTok, opens in new tab"><span class="site-footer-social-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" focusable="false"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg></span></a>
        </nav>
        <p class="site-footer-terms">
          <a class="site-footer-terms-link" href="./terms.html" id="siteFooterTermsLink">Terms and conditions</a>
          <span class="site-footer-terms-sep" aria-hidden="true">·</span>
          <a class="site-footer-terms-link" href="./terms.html" id="siteFooterTosLink">Terms of Service</a>
        </p>
      </div>
    </footer>

    <script src="./listings-data.js"></script>
    <script src="./firebase-config-public.js"></script>
    <script type="module" src="./update-mode.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script>
      (function () {
        var cfg = window.__CARDIFY_FIREBASE_CONFIG__;
        if (!cfg) {
          document.getElementById("out").textContent = "Missing firebase-config-public.js";
          return;
        }
        try {
          if (!firebase.apps.length) firebase.initializeApp(cfg);
        } catch (e) {
          document.getElementById("out").textContent = "Firebase init error: " + (e && e.message);
          return;
        }

        var out = document.getElementById("out");

        function showOk(msg) {
          out.innerHTML = '<span class="ok">SUCCESS</span>\n' + msg;
        }

        function showErr(e) {
          var m = e && e.message ? e.message : String(e);
          var c = e && e.code ? "\nCode: " + e.code : "";
          out.innerHTML = '<span class="err">FAILED</span>\n' + m + c;
        }

        /** Senegal national format: 9 digits, first digit 7 or 3 */
        function randomSenegalPhone() {
          var first = Math.random() < 0.5 ? "7" : "3";
          var s = first;
          for (var i = 0; i < 8; i++) {
            s += String(Math.floor(Math.random() * 10));
          }
          return s;
        }

        function randomListingLine() {
          var list = window.CardifyListings;
          if (!Array.isArray(list) || list.length === 0) {
            return {
              title: "(no catalog)",
              fcfa: 0,
              platform: null,
              region: null,
              amount: null,
              pairId: null
            };
          }
          var item = list[Math.floor(Math.random() * list.length)];
          return {
            title: item.title || "",
            fcfa: typeof item.fcfa === "number" ? item.fcfa : Number(item.fcfa) || 0,
            platform: item.platform || null,
            region: item.region || null,
            amount: item.amount || null,
            pairId: item.pairId != null ? item.pairId : null
          };
        }

        function formatPayloadPreview(phone, line) {
          return (
            "customerPhone: +221 " +
            phone +
            "\n" +
            "item: " +
            line.title +
            "\n" +
            "fcfa: " +
            line.fcfa +
            " · " +
            (line.platform || "") +
            " · " +
            (line.region || "") +
            " · " +
            (line.amount || "")
          );
        }

        document.getElementById("btnPayments").addEventListener("click", function () {
          out.textContent = "Sending…";
          var phone = randomSenegalPhone();
          var line = randomListingLine();
          firebase
            .firestore()
            .collection("payments")
            .add({
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              method: "firestore_ping",
              status: "manual_ui_test",
              message: "Hello from firestore-test.html (payments)",
              customerPhone: phone,
              items: [line],
              amountFcfa: line.fcfa
            })
            .then(function (ref) {
              showOk(
                "Collection: payments\nNew document ID:\n" +
                  ref.id +
                  "\n\n" +
                  formatPayloadPreview(phone, line)
              );
            })
            .catch(showErr);
        });

        document.getElementById("btnCheckoutTests").addEventListener("click", function () {
          out.textContent = "Sending…";
          var phone = randomSenegalPhone();
          var line = randomListingLine();
          firebase
            .firestore()
            .collection("checkoutTests")
            .add({
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              scenario: "manual_ui_test",
              paid: false,
              message: "Hello from firestore-test.html (checkoutTests)",
              customerPhone: phone,
              sampleItem: line
            })
            .then(function (ref) {
              showOk(
                "Collection: checkoutTests\nNew document ID:\n" +
                  ref.id +
                  "\n\n" +
                  formatPayloadPreview(phone, line)
              );
            })
            .catch(showErr);
        });
      })();
    </script>
    <script src="./footer-terms-href.js" defer></script>
  </body>
</html>
