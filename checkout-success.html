      try {
        if (localStorage.getItem("cardifyTheme") !== "light") {
          document.documentElement.classList.add("cardify-dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body class="checkout-body">
    <header class="checkout-header">

        href="./home.html"

            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo site-footer-logo--wave"
            src="./wave.png"
            alt="Wave"
            height="30"
            loading="lazy"
            decoding="async"
          />
          <img
            class="site-footer-logo site-footer-logo--om"

            height="28"
            loading="lazy"
            decoding="async"
          />
          <img

            src="./image(1).png"
            alt="Partner"
            height="32"
            loading="lazy"
            decoding="async"

        </div>

        <p class="site-footer-terms">
          <a class="site-footer-terms-link" href="./terms.html" id="siteFooterTermsLink">Terms and conditions</a>
          <span class="site-footer-terms-sep" aria-hidden="true">·</span>
          <a class="site-footer-terms-link" href="./terms.html" id="siteFooterTosLink">Terms of Service</a>

    <script src="./firebase-config-public.js"></script>
    <script type="module" src="./update-mode.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="./user-storage.js"></script>
    <script>
      (function () {
        var cfg = window.__CARDIFY_FIREBASE_CONFIG__;
        if (typeof firebase !== "undefined" && cfg) {
          try {
            if (!firebase.apps.length) firebase.initializeApp(cfg);
            if (firebase.auth && firebase.auth.Auth) {
              firebase
                .auth()
                .setPersistence(firebase.auth.Auth.Persistence.SESSION)
                .catch(function (eP) {
                  console.warn("auth persistence", eP);
                });
            }
          } catch (e) {
            console.warn(e);
          }
        }

        var titleEl = document.getElementById("successTitle");
        var detailEl = document.getElementById("successDetail");
        var params = new URLSearchParams(window.location.search);
        var sessionId = params.get("session_id");

        function fail(msg) {
          if (titleEl) titleEl.textContent = "Payment";
          if (detailEl) detailEl.textContent = msg || "Something went wrong.";
        }

        if (!sessionId) {
          fail("No Stripe session was returned. If you paid, your bank may still be processing.");
          return;
        }

        fetch("/api/stripe-session?session_id=" + encodeURIComponent(sessionId))
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data.error) {
              fail(data.error);
              return;
            }
            var paid = data.payment_status === "paid";
            if (titleEl) titleEl.textContent = paid ? "Thank you!" : "Payment pending";
            if (detailEl) {
              detailEl.textContent = paid
                ? "Your payment was received. You can close this tab or return to the shop."
                : "Status: " + (data.payment_status || "unknown") + ". Contact support if money was taken.";
            }
            if (paid && typeof CardifyUserData !== "undefined" && CardifyUserData.recordPurchase) {
              try {
                var snapHist = JSON.parse(sessionStorage.getItem("cardifyCheckoutOrder") || "");
                var histItems = (snapHist && snapHist.items) || [];
                var histAmt =
                  snapHist && snapHist.amountFcfa != null
                    ? Math.max(0, Math.round(Number(snapHist.amountFcfa)))
                    : 0;
                if (histItems.length) {
                  CardifyUserData.recordPurchase({
                    items: histItems.map(function (it) {
                      return {
                        title: it.title || "",
                        fcfa: it.fcfa,
                        platform: it.platform != null ? it.platform : null,
                        region: it.region != null ? it.region : null,
                        amount: it.amount != null ? it.amount : null,
                        pairId: it.pairId != null ? it.pairId : null
                      };
                    }),
                    method: "stripe_checkout",
                    ref: sessionId,
                    amountFcfa: histAmt
                  });
                }
              } catch (histErr) {
                /* ignore */
              }
            }
            if (typeof firebase !== "undefined" && firebase.apps.length) {
              var db = firebase.firestore();
              var meta = data.metadata || {};
              var snap = null;
              try {
                snap = JSON.parse(sessionStorage.getItem("cardifyCheckoutOrder") || "");
              } catch (e) {
                snap = null;
              }
              function normalizeSenegalMobile(raw) {
                var d = String(raw || "").replace(/\D/g, "");
                if (d.indexOf("221") === 0 && d.length >= 12) {
                  d = d.slice(3);
                }
                if (d.length === 10 && d.charAt(0) === "0") {
                  d = d.slice(1);
                }
                if (d.length === 9 && /^[37]\d{8}$/.test(d)) {
                  return d;
                }
                return "";
              }
              var phoneDigits =
                normalizeSenegalMobile(meta.customer_phone || (snap && snap.phone) || "") || "";
              var items = (snap && snap.items) || [];
              if (!items.length && meta.order_items_json) {
                try {
                  var compact = JSON.parse(meta.order_items_json);
                  if (Array.isArray(compact)) {
                    items = compact.map(function (c) {
                      return {
                        title: c.t || "",
                        fcfa: c.f,
                        quantity: c.q != null ? c.q : 1
                      };
                    });
                  }
                } catch (e2) {
                  items = [];
                }
              }
              var amtFcfa = 0;
              if (meta.amount_fcfa) {
                amtFcfa = Math.max(0, Math.round(Number(meta.amount_fcfa)));
              } else if (snap && snap.amountFcfa) {
                amtFcfa = Math.max(0, Math.round(Number(snap.amountFcfa)));
              }
              var payDoc = {
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                method: "stripe_checkout",
                status: paid ? "paid" : data.payment_status || "unknown",
                stripeSessionId: data.id || sessionId,
                amountTotal: data.amount_total,
                currency: data.currency,
                metadata: meta,
                customerPhone: phoneDigits || null
              };
              var testDoc = {
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                scenario: "confirmed_checkout_test",
                paid: paid,
                paymentStatus: data.payment_status || null,
                stripeSessionId: data.id || sessionId,
                amountTotal: data.amount_total,
                currency: data.currency
              };
              function clearOrderSnapshot() {
                try {
                  sessionStorage.removeItem("cardifyCheckoutOrder");
                } catch (e3) {}
              }
              var orderStep = Promise.resolve();
              if (paid && phoneDigits.length === 9 && items.length) {
                var orderDoc = {
                  phone: phoneDigits,
                  items: items,
                  amountFcfa: amtFcfa,
                  method: "stripe_checkout",
                  status: paid ? "paid" : data.payment_status || "unknown",
                  stripeSessionId: data.id || sessionId,
                  paid: paid,
                  amountTotal: data.amount_total,
                  currency: data.currency,
                  fulfillmentStatus: "pending"
                };
                try {
                  var fnS = (localStorage.getItem("cardifyFullName") || "").trim();
                  if (fnS && fnS.length <= 200) orderDoc.fullName = fnS;
                } catch (eFn) {
                  /* ignore */
                }
                try {
                  if (typeof firebase !== "undefined" && firebase.auth) {
                    var uS = firebase.auth().currentUser;
                    if (uS && uS.uid) orderDoc.userId = uS.uid;
                  }
                } catch (eU) {
                  /* ignore */
                }
                orderStep = db
                  .collection("orders")
                  .add({
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    ...orderDoc
                  })
                  .then(clearOrderSnapshot)
                  .catch(function () {
                    clearOrderSnapshot();
                    if (detailEl) {
                      detailEl.textContent += " (Order row was not saved — check Firestore rules for orders.)";
                    }
                  });
              } else {
                clearOrderSnapshot();
              }
              return orderStep
                .then(function () {
                  return db.collection("payments").add(payDoc);
                })
                .then(function () {
                  return db.collection("checkoutTests").add(testDoc);
                })
                .catch(function () {
                  if (detailEl) {
                    detailEl.textContent +=
                      " (Note: could not write to Firebase — allow writes on collections payments and checkoutTests.)";
                  }
                });
            }
          })
          .catch(function () {
            fail("Could not verify the session with the server.");
          });
      })();
    </script>
    <script src="./footer-terms-href.js" defer></script>
  </body>
</html>
